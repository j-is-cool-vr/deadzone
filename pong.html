<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PONG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=640,H=480;
const DPR=window.devicePixelRatio||1;
canvas.width=W*DPR;canvas.height=H*DPR;
canvas.style.width=W+'px';canvas.style.height=H+'px';
ctx.scale(DPR,DPR);
function resize(){const s=Math.min(window.innerWidth/W,window.innerHeight/H);canvas.style.width=Math.floor(W*s)+'px';canvas.style.height=Math.floor(H*s)+'px';}
resize();window.addEventListener('resize',resize);

let state='menu',mode='2p',frameCount=0;
let p1,p2,ball,score,particles=[],flashTimer=0;
const PW=12,PH=80,BALL=10,WIN=7;
const keys={};

function init(){
  p1={x:20,y:H/2-PH/2,vy:0,score:0,isAI:mode==='cpu'};
  p2={x:W-20-PW,y:H/2-PH/2,vy:0,score:0,isAI:false};
  ball={x:W/2,y:H/2,vx:(Math.random()>0.5?4:-4),vy:(Math.random()*4-2),speed:5};
  score=[0,0];particles=[];
}

window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  keys[k]=true;
  if(state==='menu'){
    if(k==='1'){mode='cpu';init();state='playing';}
    if(k==='2'){mode='2p';init();state='playing';}
  }
  if(state==='gameover'&&(k==='enter'||k===' ')){state='menu';}
  e.preventDefault();
});
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  if(state==='menu'){
    if(mx>W/2-130&&mx<W/2-10&&my>H/2-20&&my<H/2+40){mode='cpu';init();state='playing';}
    if(mx>W/2+10&&mx<W/2+130&&my>H/2-20&&my<H/2+40){mode='2p';init();state='playing';}
  }
});

function update(){
  if(state!=='playing')return;
  frameCount++;if(flashTimer>0)flashTimer--;

  // P1 input
  const p1Speed=7;
  if(keys['w']||keys['arrowup'])p1.y=Math.max(0,p1.y-p1Speed);
  if(keys['s']||keys['arrowdown'])p1.y=Math.min(H-PH,p1.y+p1Speed);

  // P2 input / AI
  if(mode==='2p'){
    if(keys['i'])p2.y=Math.max(0,p2.y-p1Speed);
    if(keys['k'])p2.y=Math.min(H-PH,p2.y+p1Speed);
  } else {
    // AI
    const aiCenter=p2.y+PH/2;
    const diff=ball.y-aiCenter;
    const aiSpeed=Math.min(5,Math.abs(diff));
    if(Math.abs(diff)>4)p2.y+=diff>0?aiSpeed:-aiSpeed;
    p2.y=Math.max(0,Math.min(H-PH,p2.y));
  }

  // Ball move
  ball.x+=ball.vx;ball.y+=ball.vy;

  // Top/bottom bounce
  if(ball.y-BALL/2<=0){ball.y=BALL/2;ball.vy*=-1;mkBurst(ball.x,0,'#ffffff');}
  if(ball.y+BALL/2>=H){ball.y=H-BALL/2;ball.vy*=-1;mkBurst(ball.x,H,'#ffffff');}

  // Paddle hit P1
  if(ball.vx<0&&ball.x-BALL/2<=p1.x+PW&&ball.x+BALL/2>=p1.x&&ball.y+BALL/2>=p1.y&&ball.y-BALL/2<=p1.y+PH){
    ball.x=p1.x+PW+BALL/2;
    const rel=(ball.y-(p1.y+PH/2))/(PH/2);
    const ang=rel*Math.PI/3;
    ball.speed=Math.min(14,ball.speed+0.4);
    ball.vx=Math.cos(ang)*ball.speed;ball.vy=Math.sin(ang)*ball.speed;
    flashTimer=4;mkBurst(ball.x,ball.y,'#ffaa00');
  }
  // Paddle hit P2
  if(ball.vx>0&&ball.x+BALL/2>=p2.x&&ball.x-BALL/2<=p2.x+PW&&ball.y+BALL/2>=p2.y&&ball.y-BALL/2<=p2.y+PH){
    ball.x=p2.x-BALL/2;
    const rel=(ball.y-(p2.y+PH/2))/(PH/2);
    const ang=Math.PI-rel*Math.PI/3;
    ball.speed=Math.min(14,ball.speed+0.4);
    ball.vx=-Math.cos(rel*Math.PI/3)*ball.speed;ball.vy=Math.sin(rel*Math.PI/3)*ball.speed;
    flashTimer=4;mkBurst(ball.x,ball.y,'#ffaa00');
  }

  // Score
  if(ball.x<0){
    score[1]++;mkBurst(50,ball.y,'#3498db');
    if(score[1]>=WIN)state='gameover';
    else resetBall(1);
  }
  if(ball.x>W){
    score[0]++;mkBurst(W-50,ball.y,'#e74c3c');
    if(score[0]>=WIN)state='gameover';
    else resetBall(-1);
  }

  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.9;p.vy*=.9;p.life--;if(p.life<=0)particles.splice(i,1);}
}

function resetBall(dir){ball={x:W/2,y:H/2,vx:dir*4,vy:(Math.random()*4-2),speed:5};}
function mkBurst(x,y,col){for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20,color:col});}}

function draw(){
  ctx.fillStyle=flashTimer>0?'#0a0808':'#050505';ctx.fillRect(0,0,W,H);

  if(state==='menu'){drawMenu();return;}

  // Centre line
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=2;ctx.setLineDash([10,10]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);

  // Paddles
  ctx.fillStyle='#e74c3c';ctx.shadowBlur=10;ctx.shadowColor='#e74c3c';
  ctx.fillRect(p1.x,p1.y,PW,PH);
  ctx.fillStyle='#3498db';ctx.shadowColor='#3498db';
  ctx.fillRect(p2.x,p2.y,PW,PH);
  ctx.shadowBlur=0;

  // Ball
  ctx.fillStyle='#ffffff';ctx.shadowBlur=12;ctx.shadowColor='#ffffff';
  ctx.beginPath();ctx.arc(ball.x,ball.y,BALL/2,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Ball trail
  ctx.fillStyle='rgba(255,255,255,0.08)';
  for(let t=1;t<=4;t++){ctx.beginPath();ctx.arc(ball.x-ball.vx*t*.6,ball.y-ball.vy*t*.6,(BALL/2)*(1-t*.2),0,Math.PI*2);ctx.fill();}

  // Particles
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.restore();});

  // Score
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.font='bold 80px monospace';ctx.textAlign='center';
  ctx.fillText(score[0],W/4,H/2+30);ctx.fillText(score[1],3*W/4,H/2+30);

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,22);
  ctx.fillStyle='#e74c3c';ctx.font='bold 12px monospace';ctx.textAlign='left';ctx.fillText('P1',14,15);
  ctx.fillStyle='#3498db';ctx.textAlign='right';ctx.fillText(mode==='cpu'?'CPU':'P2',W-14,15);
  ctx.fillStyle='#555';ctx.textAlign='center';
  ctx.fillText(mode==='2p'?'P1: W/S  •  P2: I/K':'P1: W/S  •  P2: CPU',W/2,15);

  // Labels
  ctx.fillStyle='rgba(231,76,60,0.4)';ctx.font='8px monospace';ctx.textAlign='center';
  ctx.fillText('P1',W/4,H-8);
  ctx.fillStyle='rgba(52,152,219,0.4)';
  ctx.fillText(mode==='cpu'?'CPU':'P2',3*W/4,H-8);

  if(state==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
    const w=score[0]>score[1]?'P1':(mode==='cpu'?'CPU':'P2');
    const col=score[0]>score[1]?'#e74c3c':'#3498db';
    ctx.save();ctx.shadowBlur=25;ctx.shadowColor=col;ctx.fillStyle=col;
    ctx.font='bold 32px monospace';ctx.textAlign='center';
    ctx.fillText(score[0]>score[1]?'P1 WINS!':(mode==='cpu'?'CPU WINS!':'P2 WINS!'),W/2,H/2-30);ctx.restore();
    ctx.fillStyle='#888';ctx.font='12px monospace';ctx.textAlign='center';
    ctx.fillText(`${score[0]} — ${score[1]}`,W/2,H/2+5);
    if(Math.floor(frameCount/25)%2===0){ctx.fillStyle='#aaa';ctx.font='9px monospace';ctx.fillText('[ ENTER — BACK TO MENU ]',W/2,H/2+40);}
  }
}

function drawMenu(){
  ctx.save();ctx.shadowBlur=30;ctx.shadowColor='#ffffff';
  ctx.fillStyle='#fff';ctx.font='bold 72px monospace';ctx.textAlign='center';ctx.fillText('PONG',W/2,H/2-70);ctx.restore();
  ctx.fillStyle='#555';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText(`FIRST TO ${WIN} WINS`,W/2,H/2-20);
  // Buttons
  ctx.fillStyle='#1a1a1a';ctx.fillRect(W/2-130,H/2-20,120,60);
  ctx.strokeStyle='#e74c3c';ctx.lineWidth=2;ctx.strokeRect(W/2-130,H/2-20,120,60);
  ctx.fillStyle='#e74c3c';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('vs CPU',W/2-70,H/2+10);
  ctx.fillStyle='#555';ctx.font='8px monospace';ctx.fillText('[1]',W/2-70,H/2+26);
  ctx.fillStyle='#1a1a1a';ctx.fillRect(W/2+10,H/2-20,120,60);
  ctx.strokeStyle='#3498db';ctx.lineWidth=2;ctx.strokeRect(W/2+10,H/2-20,120,60);
  ctx.fillStyle='#3498db';ctx.font='bold 12px monospace';ctx.fillText('2 PLAYER',W/2+70,H/2+10);
  ctx.fillStyle='#555';ctx.font='8px monospace';ctx.fillText('[2]',W/2+70,H/2+26);
  ctx.fillStyle='#2a2a2a';ctx.font='7px monospace';ctx.textAlign='center';
  ctx.fillText('P1: W/S or ↑↓   •   P2: I/K',W/2,H-15);
}

function loop(){frameCount++;update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
