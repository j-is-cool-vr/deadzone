<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SNAKE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=640,H=480;
const DPR=window.devicePixelRatio||1;
canvas.width=W*DPR;canvas.height=H*DPR;
canvas.style.width=W+'px';canvas.style.height=H+'px';
ctx.scale(DPR,DPR);
function resize(){const s=Math.min(window.innerWidth/W,window.innerHeight/H);canvas.style.width=Math.floor(W*s)+'px';canvas.style.height=Math.floor(H*s)+'px';}
resize();window.addEventListener('resize',resize);

const COLS=32,ROWS=24,CS=W/COLS;
let state='menu',score=0,hi=parseInt(localStorage.getItem('snake_hi')||'0');
let snake,dir,nextDir,food,frameCount=0,moveTimer=0,moveDelay=8;
let particles=[],growing=false,flashTimer=0;

function init(){
  snake=[{x:16,y:12},{x:15,y:12},{x:14,y:12}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  food=spawnFood();score=0;moveTimer=0;moveDelay=8;particles=[];
}

function spawnFood(){
  let f;
  do{f={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===f.x&&s.y===f.y));
  return f;
}

const keys={};
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(state==='menu'&&(k==='enter'||k===' ')){init();state='playing';}
  if(state==='dead'&&(k==='enter'||k===' ')){init();state='playing';}
  if(state==='playing'){
    if((k==='arrowup'||k==='w')&&dir.y===0)nextDir={x:0,y:-1};
    if((k==='arrowdown'||k==='s')&&dir.y===0)nextDir={x:0,y:1};
    if((k==='arrowleft'||k==='a')&&dir.x===0)nextDir={x:-1,y:0};
    if((k==='arrowright'||k==='d')&&dir.x===0)nextDir={x:1,y:0};
  }
  e.preventDefault();
});

function update(){
  if(state!=='playing')return;
  frameCount++;moveTimer++;
  if(flashTimer>0)flashTimer--;
  if(moveTimer<moveDelay)return;
  moveTimer=0;
  dir={...nextDir};
  const head={x:(snake[0].x+dir.x+COLS)%COLS,y:(snake[0].y+dir.y+ROWS)%ROWS};
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){
    if(score>hi){hi=score;localStorage.setItem('snake_hi',hi);}
    for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,spd=2+Math.random()*4;particles.push({x:snake[0].x*CS+CS/2,y:snake[0].y*CS+CS/2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:40,color:'#39ff14'});}
    state='dead';return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10;food=spawnFood();flashTimer=8;
    for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,spd=2+Math.random()*3;particles.push({x:head.x*CS+CS/2,y:head.y*CS+CS/2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:30,color:'#ff3300'});}
    moveDelay=Math.max(3,moveDelay-0.15);
  } else snake.pop();
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.88;p.vy*=.88;p.life--;if(p.life<=0)particles.splice(i,1);}
}

function draw(){
  // Background
  ctx.fillStyle='#050a05';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(57,255,20,0.04)';ctx.lineWidth=1;
  for(let x=0;x<=W;x+=CS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=CS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  if(state==='menu'){drawMenu();return;}

  // Particles
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life/40;ctx.fillStyle=p.color;ctx.shadowBlur=6;ctx.shadowColor=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.restore();});

  // Food
  const fp=flashTimer>0&&Math.floor(frameCount/2)%2===0;
  ctx.save();ctx.fillStyle=fp?'#ffffff':'#ff3300';ctx.shadowBlur=12;ctx.shadowColor='#ff3300';
  ctx.fillRect(food.x*CS+2,food.y*CS+2,CS-4,CS-4);
  ctx.restore();
  // Food pulse
  ctx.save();ctx.globalAlpha=0.3+Math.sin(frameCount*.15)*.2;ctx.strokeStyle='#ff3300';ctx.lineWidth=1;
  ctx.strokeRect(food.x*CS+1,food.y*CS+1,CS-2,CS-2);ctx.restore();

  // Snake
  snake.forEach((s,i)=>{
    const t=i/snake.length;
    const green=Math.floor(255*(1-t*0.5));
    ctx.fillStyle=`rgb(0,${green},0)`;
    if(i===0){ctx.shadowBlur=10;ctx.shadowColor='#39ff14';}else ctx.shadowBlur=0;
    ctx.fillRect(s.x*CS+1,s.y*CS+1,CS-2,CS-2);
    if(i===0){
      ctx.shadowBlur=0;
      // Eyes
      const ex=dir.x,ey=dir.y;
      ctx.fillStyle='#000';
      const eyeSize=3,cx=s.x*CS+CS/2,cy=s.y*CS+CS/2;
      const perp={x:-ey,y:ex};
      ctx.fillRect(cx+ex*4+perp.x*3-1,cy+ey*4+perp.y*3-1,eyeSize,eyeSize);
      ctx.fillRect(cx+ex*4-perp.x*3-1,cy+ey*4-perp.y*3-1,eyeSize,eyeSize);
    }
  });

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,24);
  ctx.fillStyle='#39ff14';ctx.font='bold 11px monospace';ctx.textAlign='left';
  ctx.fillText(`SCORE: ${score}`,10,16);
  ctx.fillStyle='#1a6a0a';ctx.textAlign='right';
  ctx.fillText(`BEST: ${hi}`,W-10,16);
  ctx.fillStyle='#0a3a05';ctx.textAlign='center';
  ctx.fillText('WASD / ARROWS — MOVE',W/2,16);

  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.shadowBlur=20;ctx.shadowColor='#39ff14';
    ctx.fillStyle='#39ff14';ctx.font='bold 28px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-30);ctx.restore();
    ctx.fillStyle='#1a6a0a';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText(`SCORE: ${score}   BEST: ${hi}`,W/2,H/2);
    if(Math.floor(frameCount/25)%2===0){ctx.fillStyle='#39ff14';ctx.fillText('[ ENTER — PLAY AGAIN ]',W/2,H/2+30);}
  }
}

function drawMenu(){
  ctx.save();ctx.shadowBlur=30;ctx.shadowColor='#39ff14';
  ctx.fillStyle='#39ff14';ctx.font='bold 64px monospace';ctx.textAlign='center';
  ctx.fillText('SNAKE',W/2,H/2-50);ctx.restore();
  ctx.fillStyle='#1a6a0a';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText('EAT THE RED FOOD — DON\'T HIT YOURSELF',W/2,H/2);
  ctx.fillText(`BEST: ${hi}`,W/2,H/2+20);
  if(Math.floor(frameCount/25)%2===0){ctx.fillStyle='#39ff14';ctx.font='10px monospace';ctx.fillText('[ PRESS ENTER TO START ]',W/2,H/2+50);}
  ctx.fillStyle='#0a2a05';ctx.font='8px monospace';ctx.fillText('WASD or ARROW KEYS to move',W/2,H-15);
}

function loop(){frameCount++;update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
